server:
  port: 1024
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  application:
    name: ai-factory-backend

  # 激活的环境配置，可通过 -Dspring.profiles.active=prod 来切换
  profiles:
    active: dev

  # Cache配置
  cache:
    type: none  # 禁用缓存
    # cache-null-values: false
    # key-prefix: "prompt:"
    # use-key-prefix: true

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.aifactory.entity
  configuration:
    map-underscore-to-camel-case: true
    # 关闭SQL日志输出
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc OpenAPI 配置 (生产环境请关闭)
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.aifactory.controller
  paths-to-match: /**

# Actuator 配置 - 仅暴露 health 端点，隐藏其他敏感端点
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      enabled: true
      show-details: never
      show-components: never
